<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survey Form</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Toaster container (top-left) -->
  <div id="toaster" aria-live="polite"></div>

  <div class="page-wrap">

    <header>
      <p class="label">Community Feedback</p>
      <h1>Survey Form</h1>
      <p>Share your thoughts. Takes less than a minute.</p>
    </header>

    <div class="main-grid">

      <!-- ── Form ── -->
      <section>
        <div class="form-card">
          <h2>Your Details</h2>
          <form id="surveyForm" novalidate>

            <div class="field">
              <label for="name">Full Name <span class="required">*</span></label>
              <input type="text" id="name" placeholder="e.g. Rahul Menon" autocomplete="name" />
              <p class="field-hint error" id="nameHint"></p>
            </div>

            <div class="field">
              <label for="email">Email Address <span class="required">*</span></label>
              <input type="email" id="email" placeholder="e.g. rahul@email.com" autocomplete="email" />
              <p class="field-hint error" id="emailHint"></p>
            </div>

            <div class="field">
              <label for="phone">Phone Number <span class="required">*</span></label>
              <input type="tel" id="phone" placeholder="10-digit number" maxlength="10" inputmode="numeric" autocomplete="tel" />
              <p class="field-hint error" id="phoneHint"></p>
            </div>

            <div class="field">
              <label for="message">Message <span class="required">*</span></label>
              <textarea id="message" placeholder="Write your message here..."></textarea>
              <p class="field-hint error" id="messageHint"></p> 
              <p class="word-count" id="wordCount">0 / 200 words</p>
            </div>

            <button type="submit">Submit Survey</button>
          </form>
        </div>
      </section>

      <!-- ── Submissions List ── -->
      <section>
        <div class="submissions-panel">
          <h2>Submissions</h2>
          <div class="empty-state" id="emptyState">No submissions yet. Be the first!</div>
          <div class="submissions-list" id="submissionsList"></div>
        </div>
      </section>

    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
